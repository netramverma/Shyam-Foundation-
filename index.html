<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apps Script App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        iframe { border: none; width: 100%; height: 100%; }
        
        /* Floating Refresh Button Ki Styling */
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            user-select: none;
        }
        .refresh-btn:active { background-color: #0056b3; }
    </style>
</head>
<body>

    <!-- Refresh Button (Gol Ghumne Wala Icon) -->
    <button class="refresh-btn" onclick="refreshApp()">🔄</button>

    <!-- Apps Script Ka Iframe -->
    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbzPouICmSwkPwnrx9a3iKtklAci_-9hXHJq9bwLxjfmz44sNm_9jGlG6z_1dmXvM4x6/exec"></iframe>

    <script>
        // Refresh karne ka function
        function refreshApp() {
            var iframe = document.getElementById('appFrame');
            iframe.src = iframe.src; // Isse iframe andar se reload ho jayega
        }

        // Service Worker Register karna
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
